<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — UniAttend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-left">
            <div class="login-brand">
                <img src="{{ url_for('static', filename='unimaslogo.png') }}" class="brand-logo">
                <span>UniAttend</span>
            </div>
            <div class="login-tagline">
                <h1>Face-based<br>attendance.<br><em>Automated.</em></h1>
                <p>Powered by OpenCV + LBPH recognition.</p>
            </div>
            <div class="login-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="login-right">
            <div class="login-box">
                <h2>System Login</h2>
                <p class="login-sub">Sign in to access your dashboard</p>

                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div class="flash-msg">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary full-width">Sign In</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
