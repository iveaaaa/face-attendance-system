{% extends "base.html" %}
{% block title %}Edit Profile — UniAttend{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Edit Profile</h1>
        <p class="page-sub">Update your program and email</p>
    </div>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" value="{{ student.name }}" disabled>
        </div>

        <div class="form-group">
            <label>Student ID</label>
            <input type="text" value="{{ student.student_id }}" disabled>
        </div>

        <div class="form-group">
            <label>Program</label>
            <input type="text" name="program" value="{{ student.program if student.program else '' }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ student.email if student.email else '' }}">
        </div>

        <div class="modal-actions">
            <a href="{{ url_for('student_profile') }}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
